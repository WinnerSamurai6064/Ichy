name: iechilli
description: IEchilli - A modern chat application by TEKDEV
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP & API
  http: ^1.2.0
  dio: ^5.4.0
  
  # State Management
  provider: ^6.1.2
  
  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # UI
  flutter_svg: ^2.0.10
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  emoji_picker_flutter: ^2.1.0
  image_picker: ^1.0.7
  file_picker: ^8.0.0
  
  # WebSocket (real-time)
  web_socket_channel: ^2.4.0
  
  # Utils
  intl: ^0.19.0
  uuid: ^4.3.3
  timeago: ^3.6.1
  path_provider: ^2.1.2
  mime: ^1.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
